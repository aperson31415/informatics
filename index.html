<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>aperson - Informatics</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --hover: #21262d; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

        /* SIDEBAR - STRICT WIDTH */
        #sidebar { 
            flex: 0 0 320px; 
            width: 320px;
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        
        .header { padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border); color: var(--accent); }
        #tree { overflow-y: auto; flex-grow: 1; padding: 10px; white-space: nowrap; }

        .folder-wrapper { margin-left: 12px; border-left: 1px solid #444; }
        .folder-header { padding: 6px; cursor: pointer; display: flex; align-items: center; border-radius: 4px; font-size: 13px; }
        .folder-header:hover { background: var(--hover); }
        .folder-header::before { content: '▸'; margin-right: 6px; transition: 0.2s; color: #8b949e; }
        .folder-header.open::before { transform: rotate(90deg); }
        
        .file-item { padding: 4px 8px 4px 24px; cursor: pointer; font-size: 13px; color: #8b949e; border-radius: 4px; }
        .file-item:hover { color: var(--accent); background: var(--hover); }
        .hidden { display: none !important; }

        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        .toolbar { padding: 10px 20px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        #viewer-container { flex: 1; overflow: auto; }
        pre, #markdown-display { padding: 20px; margin: 0; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        button { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">Informatics</div>
    <div id="tree">Loading...</div>
</div>

<div id="main">
    <div class="toolbar">
        <span id="file-title">Select a file</span>
        <button onclick="copyCode()">Copy</button>
    </div>
    <div id="viewer-container">
        <pre id="code-pre" class="hidden"><code id="code-display" class="language-cpp"></code></pre>
        <div id="markdown-display" class="hidden"></div>
        <iframe id="pdf-display" class="hidden"></iframe>
        <iframe id="html-display" class="hidden"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/9000.0.1/components/prism-bash.min.js" integrity="sha512-35RBtvuCKWANuRid6RXP2gYm4D5RMieVL/xbp6KiMXlIqgNrI7XRUh9HurE8lKHW4aRpC0TZU3ZfqG8qmQ35zA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/9000.0.1/components/prism-css-extras.min.js" integrity="sha512-K0jR40qf49ofHWKKE6IRibVqiVWKhskpbKRbDkGPVau+se/pmuWgyXxzVMq8jhXPsnG4dSIaVTcn3tapA/zzKQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/9000.0.1/components/prism-css-extras.min.js" integrity="sha512-K0jR40qf49ofHWKKE6IRibVqiVWKhskpbKRbDkGPVau+se/pmuWgyXxzVMq8jhXPsnG4dSIaVTcn3tapA/zzKQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/9000.0.1/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/9000.0.1/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<script>
    const treeDiv = document.getElementById('tree');
    const codeDisplay = document.getElementById('code-display');
    const codePre = document.getElementById('code-pre');
    const mdDisplay = document.getElementById('markdown-display');
    const pdfDisplay = document.getElementById('pdf-display');
    const htmlDisplay = document.getElementById('html-display');

    fetch('files.json').then(res => res.json()).then(data => {
        treeDiv.innerHTML = '';
        renderTree(buildTree(data), treeDiv);
    });

    function buildTree(files) {
        const root = {};
        files.forEach(file => {
            const parts = file.path.split('/').filter(p => p);
            // If the first part is your repo name, this logic skips it to keep the tree clean
            let current = root;
            parts.forEach((part, i) => {
                if (i === parts.length - 1) current[part] = file;
                else { current[part] = current[part] || {}; current = current[part]; }
            });
        });
        return root;
    }

    function renderTree(obj, container) {
        const keys = Object.keys(obj).sort((a,b) => (!!obj[a].path - !!obj[b].path) || a.localeCompare(b));
        keys.forEach(key => {
            const item = obj[key];
            if (item.path) {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerText = '📄 ' + key;
                div.onclick = () => loadFile(item.path, item.name);
                container.appendChild(div);
            } else {
                const header = document.createElement('div');
                header.className = 'folder-header';
                header.innerText = '📁 ' + key;
                const wrapper = document.createElement('div');
                wrapper.className = 'folder-wrapper hidden';
                header.onclick = () => { header.classList.toggle('open'); wrapper.classList.toggle('hidden'); };
                renderTree(item, wrapper);
                container.appendChild(header);
                container.appendChild(wrapper);
            }
        });
    }

    async function loadFile(rawPath, name) {
        // PATH FIX: GitHub Pages needs paths relative to the current URL.
        // Jekyll paths are absolute (/repo/folder/file). We make them relative.
        const pathParts = rawPath.split('/').filter(p => p);
        const repoName = window.location.pathname.split('/').filter(p => p)[0];
        
        // Remove repo name from path if it's there
        if (pathParts[0] === repoName) pathParts.shift();
        const finalPath = pathParts.join('/');

        document.getElementById('file-title').innerText = name;
        [codePre, mdDisplay, pdfDisplay, htmlDisplay].forEach(el => el.classList.add('hidden'));

        const ext = name.split('.').pop().toLowerCase();

        if (ext === 'pdf') {
            pdfDisplay.classList.remove('hidden');
            pdfDisplay.src = finalPath;
        } else {
            const res = await fetch(finalPath);
            const text = await res.text();
            if (ext === 'md') {
                mdDisplay.classList.remove('hidden');
                mdDisplay.innerHTML = marked.parse(text);
            } else if(ext === 'html' || ext == 'htm' || ext == 'hta') {
                htmlDisplay.classList.remove('hidden');
                const parser = new DOMParser();
                const htmlDoc = parser.parseFromString(text, 'text/html');
                htmlDisplay.setAttribute("srcdoc", text);
            } else {
                codePre.classList.remove('hidden');
                codeDisplay.textContent = text;
                const langMap = { 'cpp':'cpp', 'c':'cpp', 'h':'cpp', 'py':'python', 'js':'javascript', 'css':'css', 'bash':'bash', 'sh':'bash' };
                codeDisplay.className = `language-${langMap[ext] || 'plaintext'}`;
                Prism.highlightElement(codeDisplay);
            }
        }
    }

    function copyCode() {
        const text = !codePre.classList.contains('hidden') ? codeDisplay.textContent : mdDisplay.innerText;
        navigator.clipboard.writeText(text);
    }
</script>
</body>
</html>
